services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: utilml
      POSTGRES_PASSWORD: utilml_pass
      POSTGRES_DB: utilml
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://utilml:utilml_pass@postgres:5432/utilml
      REDIS_URL: redis://redis:6379/0

      DETECTORS: yolo_onnx,groundingdino

      GROUNDINGDINO_CONFIG: /app/models/GroundingDINO_SwinT_OGC.py
      GROUNDINGDINO_WEIGHTS: /app/models/groundingdino_swint_ogc.pth
      GROUNDINGDINO_PROMPT: >
        utility pole. wooden pole. power pole.
        crossarm. wooden crossarm. fiberglass crossarm.
        distribution transformer. pole mounted transformer. electrical transformer.
        fuse cutout. utility fuse.
        insulator. power line insulator.
        jumper wire. electrical jumper.
        lightning arrester. surge arrester.
        power cable. overhead wire.
        telecom cable. communication cable.
        street light.
        disconnect switch.
        recloser. pole mounted recloser.
        control cabinet. electrical cabinet.
      GROUNDINGDINO_BOX_THRESHOLD: "0.31"
      GROUNDINGDINO_TEXT_THRESHOLD: "0.25"
      GROUNDINGDINO_DEVICE: cpu

    volumes:
        - api_uploads:/app/uploads
        - ./models:/app/models:ro
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build: ./api
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql://utilml:utilml_pass@postgres:5432/utilml
      REDIS_URL: redis://redis:6379/0

      DETECTORS: yolo_onnx,groundingdino

      GROUNDINGDINO_CONFIG: /app/models/GroundingDINO_SwinT_OGC.py
      GROUNDINGDINO_WEIGHTS: /app/models/groundingdino_swint_ogc.pth
      GROUNDINGDINO_PROMPT: >
        utility pole. wooden pole. power pole.
        crossarm. wooden crossarm. fiberglass crossarm.
        distribution transformer. pole mounted transformer. electrical transformer.
        fuse cutout. utility fuse.
        insulator. power line insulator.
        jumper wire. electrical jumper.
        lightning arrester. surge arrester.
        power cable. overhead wire.
        telecom cable. communication cable.
        street light.
        disconnect switch.
        recloser. pole mounted recloser.
        control cabinet. electrical cabinet.
      GROUNDINGDINO_BOX_THRESHOLD: "0.31"
      GROUNDINGDINO_TEXT_THRESHOLD: "0.25"
      GROUNDINGDINO_DEVICE: cpu

    volumes:
        - api_uploads:/app/uploads
        - ./models:/app/models:ro
    depends_on:
      - postgres
      - redis
  web:
    build: ./web
    environment:
      VITE_API_URL: https://api-assets.brehfamily.com
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
  api_uploads:
